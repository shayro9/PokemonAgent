name: Code Review

on:
  pull_request:
    branches: [main]
  pull_request_review_comment:
    types: [created]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint flake8 mypy bandit

      - name: Get changed files
        id: changed-files
        run: |
          # Get list of changed Python files in this PR
          git diff --name-only origin/main...HEAD -- '*.py' > changed_files.txt
          cat changed_files.txt

      - name: Run static analysis (pylint)
        id: pylint
        continue-on-error: true
        run: |
          echo "## Pylint Analysis" >> /tmp/review.md
          pylint --disable=all --enable=E,F --output-format=json $(cat changed_files.txt 2>/dev/null | tr '\n' ' ') > /tmp/pylint.json 2>&1 || true
          
          if [ -s /tmp/pylint.json ]; then
            python << 'EOF'
import json
try:
    with open('/tmp/pylint.json') as f:
        issues = json.load(f)
    if issues:
        with open('/tmp/review.md', 'a') as f:
            f.write("🔴 **Pylint Found Issues:**\n\n")
            for issue in issues[:10]:  # Limit to first 10
                f.write(f"- **{issue['message-id']}** ({issue['symbol']}): {issue['message']}\n")
                f.write(f"  - File: `{issue['path']}:{issue['line']}`\n\n")
except json.JSONDecodeError:
    pass
EOF
          fi

      - name: Run type checking (mypy)
        id: mypy
        continue-on-error: true
        run: |
          echo "## Type Checking (mypy)" >> /tmp/review.md
          mypy $(cat changed_files.txt 2>/dev/null | tr '\n' ' ') --json-report /tmp/mypy_report 2>&1 || true
          
          if [ -f /tmp/mypy_report/*.json ]; then
            python << 'EOF'
import json
import glob

with open('/tmp/review.md', 'a') as out:
    issue_count = 0
    for report_file in glob.glob('/tmp/mypy_report/*.json'):
        try:
            with open(report_file) as f:
                data = json.load(f)
            if 'errors' in data and data['errors']:
                if issue_count == 0:
                    out.write("🟡 **Type Errors Found:**\n\n")
                for error in data['errors'][:5]:
                    out.write(f"- `{error['filename']}:{error['line']}` - {error['message']}\n")
                issue_count += 1
        except (json.JSONDecodeError, KeyError):
            pass
EOF
          fi

      - name: Security analysis (bandit)
        id: bandit
        continue-on-error: true
        run: |
          echo "## Security Analysis (Bandit)" >> /tmp/review.md
          bandit -r $(cat changed_files.txt 2>/dev/null | head -20 | tr '\n' ' ') -f json > /tmp/bandit.json 2>&1 || true
          
          if [ -s /tmp/bandit.json ]; then
            python << 'EOF'
import json
try:
    with open('/tmp/bandit.json') as f:
        results = json.load(f)
    if results['results']:
        with open('/tmp/review.md', 'a') as f:
            f.write("🔴 **Security Issues Found:**\n\n")
            for issue in results['results'][:5]:
                f.write(f"- **{issue['test_id']}** ({issue['severity']}): {issue['issue_text']}\n")
                f.write(f"  - File: `{issue['filename']}:{issue['line_number']}`\n\n")
except (json.JSONDecodeError, KeyError, FileNotFoundError):
    pass
EOF
          fi

      - name: Check for swallowed exceptions
        id: exceptions
        run: |
          echo "## Manual Code Review Checks" >> /tmp/review.md
          
          python << 'EOF'
import re
import sys

findings = []
changed_files = []
try:
    with open('changed_files.txt') as f:
        changed_files = [line.strip() for line in f if line.strip()]
except FileNotFoundError:
    pass

# Check for swallowed exceptions (blocker #1)
for filepath in changed_files:
    try:
        with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
            lines = f.readlines()
        
        for i, line in enumerate(lines, 1):
            # Pattern: except Exception: ... (with minimal handling)
            if re.search(r'except\s+Exception\s*:', line):
                # Check next few lines for actual handling
                context = ''.join(lines[i:min(i+3, len(lines))])
                if 'pass' in context or '# print' in context or 'continue' in context:
                    findings.append(f"🔴 **Swallowed exception** in `{filepath}:{i}` - Silent error handling detected")
            
            # Pattern: except.*:.*pass (or only comment)
            if re.search(r'except[^:]*:\s*(#|pass|continue)', line):
                findings.append(f"🔴 **Silent exception** in `{filepath}:{i}` - No error handling")
    except (UnicodeDecodeError, FileNotFoundError):
        pass

if findings:
    with open('/tmp/review.md', 'a') as f:
        f.write("🔴 **Common Anti-Patterns Found:**\n\n")
        for finding in findings[:5]:
            f.write(f"- {finding}\n")
        f.write("\n")
else:
    with open('/tmp/review.md', 'a') as f:
        f.write("✅ **No obvious anti-patterns detected in exception handling**\n\n")
EOF

      - name: Check for hardcoded values
        id: hardcoded
        run: |
          python << 'EOF'
import re

findings = []
changed_files = []
try:
    with open('changed_files.txt') as f:
        changed_files = [line.strip() for line in f if line.strip()]
except FileNotFoundError:
    pass

# Check for magic numbers and hardcoded values
for filepath in changed_files:
    try:
        with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
            lines = f.readlines()
        
        for i, line in enumerate(lines, 1):
            # Hardcoded threshold values
            if re.search(r'=\s*0\.[0-9]+|=\s*[0-9]{2,}\s*#', line) and 'test' not in filepath:
                findings.append(f"🟡 Hardcoded value in `{filepath}:{i}` - Consider moving to config")
    except (UnicodeDecodeError, FileNotFoundError):
        pass

if findings:
    with open('/tmp/review.md', 'a') as f:
        f.write("🟡 **Hardcoded Values Detected:**\n\n")
        for finding in findings[:3]:
            f.write(f"- {finding}\n")
        f.write("\n")
EOF

      - name: Format review comment
        id: format-comment
        run: |
          if [ -f /tmp/review.md ]; then
            echo "## 🔍 Automated Code Review" >> /tmp/review_final.md
            echo "" >> /tmp/review_final.md
            echo "Code analysis for this PR using pylint, mypy, bandit, and custom checkers." >> /tmp/review_final.md
            echo "" >> /tmp/review_final.md
            cat /tmp/review.md >> /tmp/review_final.md
            echo "" >> /tmp/review_final.md
            echo "---" >> /tmp/review_final.md
            echo "**Note:** This is an automated review. Please address any 🔴 blockers before merging. Consider the 🟡 suggestions for code quality." >> /tmp/review_final.md
            cat /tmp/review_final.md > /tmp/final_comment.txt
          fi

      - name: Post review comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewFile = '/tmp/final_comment.txt';
            
            let comment = '## 🔍 Automated Code Review\n\n';
            
            if (fs.existsSync(reviewFile)) {
              comment = fs.readFileSync(reviewFile, 'utf8');
            } else {
              comment += '✅ No issues detected in static analysis.\n\n';
              comment += 'For a comprehensive code review, request a manual review from team members.';
            }
            
            // Check if comment already exists
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingReview = comments.find(c => c.body.includes('🔍 Automated Code Review'));
            
            if (existingReview) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingReview.id,
                body: comment,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }
