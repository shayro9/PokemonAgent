name: Code Review

on:
  pull_request:
    branches: [main]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-review.txt

      - name: Run code review
        id: review
        continue-on-error: true
        run: |
          if [ -z "${{ steps.changed-files.outputs.all_changed_files }}" ]; then
            echo "No Python files changed."
          else
            python scripts/code_review.py --files ${{ steps.changed-files.outputs.all_changed_files }} --output-format markdown > /tmp/review_output.txt 2>&1
            cat /tmp/review_output.txt
          fi

      - name: Post review comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '';
            
            try {
              comment = fs.readFileSync('/tmp/review_output.txt', 'utf8');
            } catch (e) {
              comment = '✅ Code review completed with no output.\n\nFor details, run: `python scripts/code_review.py`';
            }
            
            // Add header
            const fullComment = '## 🔍 Automated Code Review\n\n' + comment + 
              '\n\n---\n\n**Note:** This review focuses on important issues. Use `--strict` mode for comprehensive checks.';
            
            // Check if comment already exists
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingReview = comments.find(c => c.body.includes('🔍 Automated Code Review'));
            
            if (existingReview) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingReview.id,
                body: fullComment,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullComment,
              });
            }
